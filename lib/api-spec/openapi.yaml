openapi: 3.1.0
info:
  title: Api
  version: 0.2.0
  description: Real Estate Investment API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: auth
  - name: user
  - name: tasks
  - name: earnings
  - name: wallet
  - name: notifications
  - name: withdrawal
  - name: helpcenter
  - name: admin
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterBody"
      responses:
        "201":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessMessage"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current session user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserFull"

  /user/profile:
    get:
      operationId: getUserProfile
      tags: [user]
      summary: Get user profile
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserFull"
    patch:
      operationId: updateUserProfile
      tags: [user]
      summary: Update user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileBody"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserFull"

  /user/avatar:
    patch:
      operationId: updateAvatar
      tags: [user]
      summary: Update user avatar
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAvatarBody"
      responses:
        "200":
          description: Avatar updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessMessage"

  /user/password:
    patch:
      operationId: changePassword
      tags: [user]
      summary: Change password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordBody"
      responses:
        "200":
          description: Password changed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessMessage"

  /user/earnings:
    get:
      operationId: getUserEarnings
      tags: [user]
      summary: Get earnings overview
      responses:
        "200":
          description: Earnings overview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EarningsSummary"

  /tasks:
    get:
      operationId: getTasks
      tags: [tasks]
      summary: Get today's rental tasks
      responses:
        "200":
          description: List of tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"

  /tasks/{id}/complete:
    post:
      operationId: completeTask
      tags: [tasks]
      summary: Complete a rental task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Task completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskResult"

  /tasks/summary:
    get:
      operationId: getTasksSummary
      tags: [tasks]
      summary: Get today's task completion summary
      responses:
        "200":
          description: Tasks summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TasksSummary"

  /wallet/recharge:
    post:
      operationId: rechargeWallet
      tags: [wallet]
      summary: Recharge wallet balance
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WalletInput"
      responses:
        "200":
          description: Recharge result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WalletResult"

  /wallet/withdraw:
    post:
      operationId: withdrawWallet
      tags: [wallet]
      summary: Submit a withdrawal request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WalletInput"
      responses:
        "200":
          description: Withdraw result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WalletResult"

  /referrals/summary:
    get:
      operationId: getReferralsSummary
      tags: [earnings]
      summary: Get referral bonus summary
      responses:
        "200":
          description: Referrals summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReferralSummary"

  /notifications:
    get:
      operationId: getNotifications
      tags: [notifications]
      summary: Get notifications for current user
      responses:
        "200":
          description: Notifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NotificationItem"

  /notifications/{id}/read:
    patch:
      operationId: markNotificationRead
      tags: [notifications]
      summary: Mark notification as read
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Marked read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessMessage"

  /withdrawal/request:
    post:
      operationId: requestWithdrawal
      tags: [withdrawal]
      summary: Submit a withdrawal request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WithdrawalRequestBody"
      responses:
        "201":
          description: Request submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WithdrawalRequestItem"

  /withdrawal/history:
    get:
      operationId: getWithdrawalHistory
      tags: [withdrawal]
      summary: Get user withdrawal history
      responses:
        "200":
          description: Withdrawal history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WithdrawalRequestItem"

  /help-center:
    get:
      operationId: getHelpCenter
      tags: [helpcenter]
      summary: Get help center contacts
      responses:
        "200":
          description: Help center contacts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HelpCenterItem"

  /admin/help-center:
    get:
      operationId: getAdminHelpCenter
      tags: [admin]
      summary: Get all help center contacts (admin)
      responses:
        "200":
          description: All help center contacts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HelpCenterItem"

  /admin/help-center/{id}:
    put:
      operationId: updateAdminHelpCenter
      tags: [admin]
      summary: Update a help center contact
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminUpdateHelpCenterBody"
      responses:
        "200":
          description: Updated help center contact
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HelpCenterItem"

  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Get admin dashboard stats
      responses:
        "200":
          description: Admin stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  /admin/notifications:
    post:
      operationId: broadcastNotification
      tags: [admin]
      summary: Broadcast notification to all users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BroadcastNotificationBody"
      responses:
        "201":
          description: Notification sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessMessage"

  /admin/users:
    get:
      operationId: getAdminUsers
      tags: [admin]
      summary: Get all users
      responses:
        "200":
          description: All users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminUserItem"

  /admin/users/{id}/activate-level:
    patch:
      operationId: activateUserLevel
      tags: [admin]
      summary: Activate or deactivate a position level for a user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminActivateLevelBody"
      responses:
        "200":
          description: Level updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserItem"

  /admin/users/{id}:
    patch:
      operationId: updateAdminUser
      tags: [admin]
      summary: Update user account (activate/disable/edit)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminUpdateUserBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserItem"
    delete:
      operationId: deleteAdminUser
      tags: [admin]
      summary: Delete a user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessMessage"

  /admin/withdrawal-requests:
    get:
      operationId: getAdminWithdrawalRequests
      tags: [admin]
      summary: Get all withdrawal requests
      responses:
        "200":
          description: Withdrawal requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminWithdrawalRequestItem"

  /admin/withdrawal-requests/{id}:
    patch:
      operationId: processWithdrawalRequest
      tags: [admin]
      summary: Approve or deny a withdrawal request
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProcessWithdrawalBody"
      responses:
        "200":
          description: Processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessMessage"

  /payment-proofs:
    post:
      operationId: submitPaymentProof
      tags: [paymentproofs]
      summary: Submit a payment screenshot proof
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitPaymentProofBody"
      responses:
        "201":
          description: Proof submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubmitPaymentProofResponse"

  /admin/payment-proofs:
    get:
      operationId: getAdminPaymentProofs
      tags: [admin]
      summary: Get all payment proofs (admin)
      responses:
        "200":
          description: All payment proofs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PaymentProofItem"

  /admin/payment-proofs/{id}:
    patch:
      operationId: updatePaymentProofStatus
      tags: [admin]
      summary: Update payment proof status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePaymentProofStatusBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessMessage"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    UpdateAvatarBody:
      type: object
      required: [avatarUrl]
      properties:
        avatarUrl:
          type: string

    SuccessMessage:
      type: object
      required: [success, message]
      properties:
        success:
          type: boolean
        message:
          type: string

    RegisterBody:
      type: object
      required: [firstName, surname, email, password, whatsappNumber, homeAddress, bankName, accountNumber, accountHolderName, zipCode, gender]
      properties:
        firstName:
          type: string
        middleName:
          type: string
        surname:
          type: string
        gender:
          type: string
          enum: [male, female]
        whatsappNumber:
          type: string
        email:
          type: string
        password:
          type: string
        homeAddress:
          type: string
        bankName:
          type: string
        accountNumber:
          type: string
        accountHolderName:
          type: string
        zipCode:
          type: string
        referralCode:
          type: string

    LoginBody:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    AuthResponse:
      type: object
      required: [user]
      properties:
        user:
          $ref: "#/components/schemas/UserFull"

    UserFull:
      type: object
      required:
        - id
        - firstName
        - middleName
        - surname
        - phone
        - whatsappNumber
        - username
        - email
        - gender
        - avatar
        - homeAddress
        - bankName
        - accountNumber
        - accountHolderName
        - zipCode
        - referralCode
        - referredBy
        - position
        - level
        - role
        - isActive
        - balance
        - securityDeposit
      properties:
        id:
          type: integer
        firstName:
          type: string
        middleName:
          type: string
        surname:
          type: string
        phone:
          type: string
        whatsappNumber:
          type: string
        username:
          type: string
        email:
          type: string
        gender:
          type: string
        avatar:
          type: string
        activatedLevels:
          type: array
          items:
            type: string
        homeAddress:
          type: string
        bankName:
          type: string
        accountNumber:
          type: string
        accountHolderName:
          type: string
        zipCode:
          type: string
        referralCode:
          type: string
        referredBy:
          type: string
        position:
          type: string
        level:
          type: string
        role:
          type: string
        isActive:
          type: boolean
        balance:
          type: number
        securityDeposit:
          type: number

    UpdateProfileBody:
      type: object
      properties:
        firstName:
          type: string
        middleName:
          type: string
        surname:
          type: string
        whatsappNumber:
          type: string
        homeAddress:
          type: string
        bankName:
          type: string
        accountNumber:
          type: string
        accountHolderName:
          type: string
        zipCode:
          type: string

    ChangePasswordBody:
      type: object
      required: [currentPassword, newPassword]
      properties:
        currentPassword:
          type: string
        newPassword:
          type: string

    EarningsSummary:
      type: object
      required:
        - yesterdayEarnings
        - todayEarnings
        - totalEarnings
        - weeklyEarnings
        - monthlyEarnings
        - completedToday
        - remainingToday
        - subordinateCommission
        - referralBonus
      properties:
        yesterdayEarnings:
          type: number
        todayEarnings:
          type: number
        totalEarnings:
          type: number
        weeklyEarnings:
          type: number
        monthlyEarnings:
          type: number
        completedToday:
          type: integer
        remainingToday:
          type: integer
        subordinateCommission:
          type: number
        referralBonus:
          type: number

    Task:
      type: object
      required: [id, propertyName, propertyType, location, reward, status, imageUrl]
      properties:
        id:
          type: integer
        propertyName:
          type: string
        propertyType:
          type: string
        location:
          type: string
        reward:
          type: number
        status:
          type: string
          enum: [pending, completed]
        imageUrl:
          type: string

    TaskResult:
      type: object
      required: [success, reward, message, newBalance]
      properties:
        success:
          type: boolean
        reward:
          type: number
        message:
          type: string
        newBalance:
          type: number

    TasksSummary:
      type: object
      required: [totalTasks, completedToday, remainingToday, totalRewardToday]
      properties:
        totalTasks:
          type: integer
        completedToday:
          type: integer
        remainingToday:
          type: integer
        totalRewardToday:
          type: number

    WalletInput:
      type: object
      required: [amount]
      properties:
        amount:
          type: number

    WalletResult:
      type: object
      required: [success, newBalance, message]
      properties:
        success:
          type: boolean
        newBalance:
          type: number
        message:
          type: string

    ReferralSummary:
      type: object
      required: [referralBonus, subordinateCommission, totalReferrals]
      properties:
        referralBonus:
          type: number
        subordinateCommission:
          type: number
        totalReferrals:
          type: integer

    NotificationItem:
      type: object
      required: [id, title, message, isRead, isBroadcast, createdAt]
      properties:
        id:
          type: integer
        title:
          type: string
        message:
          type: string
        isRead:
          type: boolean
        isBroadcast:
          type: boolean
        createdAt:
          type: string

    WithdrawalRequestBody:
      type: object
      required: [amount]
      properties:
        amount:
          type: number

    WithdrawalRequestItem:
      type: object
      required: [id, userId, amount, bankName, accountNumber, accountHolderName, status, adminNote, createdAt]
      properties:
        id:
          type: integer
        userId:
          type: integer
        amount:
          type: number
        bankName:
          type: string
        accountNumber:
          type: string
        accountHolderName:
          type: string
        status:
          type: string
        adminNote:
          type: string
        createdAt:
          type: string

    HelpCenterItem:
      type: object
      required: [id, platform, handle, url, isActive, sortOrder]
      properties:
        id:
          type: integer
        platform:
          type: string
        handle:
          type: string
        url:
          type: string
        isActive:
          type: boolean
        sortOrder:
          type: integer

    AdminUpdateHelpCenterBody:
      type: object
      properties:
        platform:
          type: string
        handle:
          type: string
        url:
          type: string
        isActive:
          type: boolean
        sortOrder:
          type: integer

    AdminStats:
      type: object
      required: [totalUsers, totalInvested, totalCommission, pendingWithdrawals]
      properties:
        totalUsers:
          type: integer
        totalInvested:
          type: number
        totalCommission:
          type: number
        pendingWithdrawals:
          type: integer

    BroadcastNotificationBody:
      type: object
      required: [title, message]
      properties:
        title:
          type: string
        message:
          type: string

    AdminUserItem:
      type: object
      required: [id, firstName, surname, email, phone, whatsappNumber, position, level, role, isActive, balance, referralCode, createdAt, activatedLevels]
      properties:
        id:
          type: integer
        firstName:
          type: string
        surname:
          type: string
        email:
          type: string
        phone:
          type: string
        whatsappNumber:
          type: string
        position:
          type: string
        level:
          type: string
        role:
          type: string
        isActive:
          type: boolean
        balance:
          type: number
        referralCode:
          type: string
        createdAt:
          type: string
        activatedLevels:
          type: array
          items:
            type: string

    AdminActivateLevelBody:
      type: object
      required: [levelKey, action]
      properties:
        levelKey:
          type: string
        action:
          type: string
          enum: [activate, deactivate]

    AdminUpdateUserBody:
      type: object
      properties:
        isActive:
          type: boolean
        role:
          type: string
        position:
          type: string
        level:
          type: string
        balance:
          type: number
        securityDeposit:
          type: number
        firstName:
          type: string
        surname:
          type: string
        email:
          type: string
        whatsappNumber:
          type: string
        bankName:
          type: string
        accountNumber:
          type: string
        accountHolderName:
          type: string

    AdminWithdrawalRequestItem:
      type: object
      required: [id, userId, userName, accountNumber, amount, bankName, accountHolderName, status, createdAt]
      properties:
        id:
          type: integer
        userId:
          type: integer
        userName:
          type: string
        accountNumber:
          type: string
        amount:
          type: number
        bankName:
          type: string
        accountHolderName:
          type: string
        status:
          type: string
        createdAt:
          type: string

    ProcessWithdrawalBody:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [approved, denied]
        adminNote:
          type: string

    SubmitPaymentProofBody:
      type: object
      required: [positionKey, fileData]
      properties:
        positionKey:
          type: string
        positionLabel:
          type: string
        amount:
          type: number
        fileData:
          type: string
        fileName:
          type: string
        fileType:
          type: string

    SubmitPaymentProofResponse:
      type: object
      required: [success, id, message]
      properties:
        success:
          type: boolean
        id:
          type: integer
        message:
          type: string

    PaymentProofItem:
      type: object
      required: [id, userId, userName, positionKey, positionLabel, amount, fileData, fileName, fileType, status, createdAt]
      properties:
        id:
          type: integer
        userId:
          type: integer
        userName:
          type: string
        positionKey:
          type: string
        positionLabel:
          type: string
        amount:
          type: number
        fileData:
          type: string
        fileName:
          type: string
        fileType:
          type: string
        status:
          type: string
        createdAt:
          type: string

    UpdatePaymentProofStatusBody:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [pending, approved, rejected]
