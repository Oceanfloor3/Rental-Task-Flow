openapi: 3.1.0
info:
  title: Api
  version: 0.2.0
  description: Real Estate Investment API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: auth
  - name: user
  - name: tasks
  - name: earnings
  - name: wallet
  - name: notifications
  - name: withdrawal
  - name: helpcenter
  - name: admin
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterBody"
      responses:
        "201":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/forgot-password:
    post:
      operationId: forgotPassword
      tags: [auth]
      summary: Request a password reset email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordBody"
      responses:
        "200":
          description: Reset email sent (or silently ignored if email not found)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessMessage"

  /auth/reset-password:
    post:
      operationId: resetPassword
      tags: [auth]
      summary: Reset password using a token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordBody"
      responses:
        "200":
          description: Password reset successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessMessage"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessMessage"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current session user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserFull"

  /user/profile:
    get:
      operationId: getUserProfile
      tags: [user]
      summary: Get user profile
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserFull"
    patch:
      operationId: updateUserProfile
      tags: [user]
      summary: Update user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileBody"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserFull"

  /user/avatar:
    patch:
      operationId: updateAvatar
      tags: [user]
      summary: Update user avatar
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAvatarBody"
      responses:
        "200":
          description: Avatar updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessMessage"

  /user/password:
    patch:
      operationId: changePassword
      tags: [user]
      summary: Change password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordBody"
      responses:
        "200":
          description: Password changed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessMessage"

  /user/transactions:
    get:
      operationId: getUserTransactions
      tags: [user]
      summary: Get user transaction history
      responses:
        "200":
          description: Transaction history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TransactionItem"

  /user/change-pin:
    post:
      operationId: changeTransactionPin
      tags: [user]
      summary: Change transaction PIN
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePinBody"
      responses:
        "200":
          description: PIN updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChangePinResponse"

  /user/transfer:
    post:
      operationId: userTransfer
      tags: [user]
      summary: Transfer balance to another user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserTransferBody"
      responses:
        "200":
          description: Transfer successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserTransferResponse"

  /user/earnings:
    get:
      operationId: getUserEarnings
      tags: [user]
      summary: Get earnings overview
      responses:
        "200":
          description: Earnings overview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EarningsSummary"

  /tasks:
    get:
      operationId: getTasks
      tags: [tasks]
      summary: Get today's rental tasks
      responses:
        "200":
          description: List of tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"

  /tasks/{id}/complete:
    post:
      operationId: completeTask
      tags: [tasks]
      summary: Complete a rental task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Task completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskResult"

  /tasks/summary:
    get:
      operationId: getTasksSummary
      tags: [tasks]
      summary: Get today's task completion summary
      responses:
        "200":
          description: Tasks summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TasksSummary"

  /wallet/recharge:
    post:
      operationId: rechargeWallet
      tags: [wallet]
      summary: Recharge wallet balance
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WalletInput"
      responses:
        "200":
          description: Recharge result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WalletResult"

  /wallet/withdraw:
    post:
      operationId: withdrawWallet
      tags: [wallet]
      summary: Submit a withdrawal request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WalletInput"
      responses:
        "200":
          description: Withdraw result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WalletResult"

  /referrals/summary:
    get:
      operationId: getReferralsSummary
      tags: [earnings]
      summary: Get referral bonus summary
      responses:
        "200":
          description: Referrals summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReferralSummary"

  /referrals/transfer:
    post:
      operationId: transferReferralBalance
      tags: [earnings]
      summary: Transfer referral bonus and subordinate commission to main balance
      responses:
        "200":
          description: Transfer result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransferReferralBalanceResponse"

  /referrals/leadership-transfer:
    post:
      operationId: transferLeadershipBalance
      tags: [earnings]
      summary: Transfer leadership balance to main wallet balance
      responses:
        "200":
          description: Transfer result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransferReferralBalanceResponse"

  /notifications:
    get:
      operationId: getNotifications
      tags: [notifications]
      summary: Get notifications for current user
      responses:
        "200":
          description: Notifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NotificationItem"

  /notifications/{id}/read:
    patch:
      operationId: markNotificationRead
      tags: [notifications]
      summary: Mark notification as read
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Marked read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessMessage"

  /withdrawal/request:
    post:
      operationId: requestWithdrawal
      tags: [withdrawal]
      summary: Submit a withdrawal request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WithdrawalRequestBody"
      responses:
        "201":
          description: Request submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WithdrawalRequestItem"

  /withdrawal/history:
    get:
      operationId: getWithdrawalHistory
      tags: [withdrawal]
      summary: Get user withdrawal history
      responses:
        "200":
          description: Withdrawal history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WithdrawalRequestItem"

  /withdrawal/lock-status:
    get:
      operationId: getWithdrawalLockStatus
      tags: [withdrawal]
      summary: Get combined withdrawal lock status for the current user
      responses:
        "200":
          description: Current lock status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WithdrawalLockStatus"

  /help-center:
    get:
      operationId: getHelpCenter
      tags: [helpcenter]
      summary: Get help center contacts
      responses:
        "200":
          description: Help center contacts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HelpCenterItem"

  /admin/help-center:
    get:
      operationId: getAdminHelpCenter
      tags: [admin]
      summary: Get all help center contacts (admin)
      responses:
        "200":
          description: All help center contacts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HelpCenterItem"

  /admin/help-center/{id}:
    put:
      operationId: updateAdminHelpCenter
      tags: [admin]
      summary: Update a help center contact
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminUpdateHelpCenterBody"
      responses:
        "200":
          description: Updated help center contact
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HelpCenterItem"

  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Get admin dashboard stats
      responses:
        "200":
          description: Admin stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  /admin/notifications:
    post:
      operationId: broadcastNotification
      tags: [admin]
      summary: Broadcast notification to all users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BroadcastNotificationBody"
      responses:
        "201":
          description: Notification sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessMessage"

  /admin/users:
    get:
      operationId: getAdminUsers
      tags: [admin]
      summary: Get all users
      responses:
        "200":
          description: All users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminUserItem"

  /admin/users/{id}/activate-level:
    patch:
      operationId: activateUserLevel
      tags: [admin]
      summary: Activate or deactivate a position level for a user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminActivateLevelBody"
      responses:
        "200":
          description: Level updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserItem"

  /admin/users/{id}:
    patch:
      operationId: updateAdminUser
      tags: [admin]
      summary: Update user account (activate/disable/edit)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminUpdateUserBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserItem"
    delete:
      operationId: deleteAdminUser
      tags: [admin]
      summary: Delete a user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessMessage"

  /admin/users/{id}/balance-adjust:
    post:
      operationId: adminBalanceAdjust
      tags: [admin]
      summary: Credit or debit a user's balance
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminBalanceAdjustBody"
      responses:
        "200":
          description: Balance adjusted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminBalanceAdjustResponse"

  /admin/withdrawal-requests:
    get:
      operationId: getAdminWithdrawalRequests
      tags: [admin]
      summary: Get all withdrawal requests
      responses:
        "200":
          description: Withdrawal requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminWithdrawalRequestItem"

  /admin/withdrawal-requests/{id}:
    patch:
      operationId: processWithdrawalRequest
      tags: [admin]
      summary: Approve or deny a withdrawal request
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProcessWithdrawalBody"
      responses:
        "200":
          description: Processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessMessage"
    delete:
      operationId: deleteWithdrawalRequest
      tags: [admin]
      summary: Delete a withdrawal request (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessMessage"

  /payment-proofs:
    post:
      operationId: submitPaymentProof
      tags: [paymentproofs]
      summary: Submit a payment screenshot proof
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitPaymentProofBody"
      responses:
        "201":
          description: Proof submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubmitPaymentProofResponse"

  /admin/payment-proofs:
    get:
      operationId: getAdminPaymentProofs
      tags: [admin]
      summary: Get all payment proofs (admin)
      responses:
        "200":
          description: All payment proofs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PaymentProofItem"

  /admin/withdrawal-settings:
    get:
      operationId: getWithdrawalSettings
      tags: [admin]
      summary: Get master withdrawal lock settings
      responses:
        "200":
          description: Current withdrawal settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WithdrawalSettings"
    patch:
      operationId: updateWithdrawalSettings
      tags: [admin]
      summary: Update master withdrawal lock (lock/unlock all users + set timeframe)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateWithdrawalSettingsBody"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WithdrawalSettings"

  /admin/users/{id}/withdrawal-lock:
    patch:
      operationId: toggleUserWithdrawalLock
      tags: [admin]
      summary: Lock or unlock a specific user's withdrawal
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ToggleUserWithdrawalLockBody"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserItem"

  /admin/payment-proofs/{id}:
    patch:
      operationId: updatePaymentProofStatus
      tags: [admin]
      summary: Update payment proof status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePaymentProofStatusBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessMessage"
    delete:
      operationId: deletePaymentProof
      tags: [admin]
      summary: Delete a payment proof (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessMessage"

  /lock-funds-visible:
    get:
      operationId: getLockFundsVisible
      tags: [user]
      summary: Get whether the Lock Funds card is visible on user dashboards
      responses:
        "200":
          description: Lock Funds visibility state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LockFundsVisibleResponse"

  /admin/lock-funds-visible:
    get:
      operationId: getAdminLockFundsVisible
      tags: [admin]
      summary: Get Lock Funds card visibility setting (admin)
      responses:
        "200":
          description: Current visibility state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LockFundsVisibleResponse"
    post:
      operationId: setAdminLockFundsVisible
      tags: [admin]
      summary: Enable or disable the Lock Funds card on user dashboards
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetLockFundsVisibleBody"
      responses:
        "200":
          description: Visibility updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LockFundsVisibleResponse"

  /flash-message:
    get:
      operationId: getFlashMessage
      tags: [user]
      summary: Get the current flash message (shown to users on login)
      responses:
        "200":
          description: Flash message (null if none set)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FlashMessageResponse"

  /admin/flash-message:
    get:
      operationId: getAdminFlashMessage
      tags: [admin]
      summary: Get current flash message (admin)
      responses:
        "200":
          description: Current flash message
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FlashMessageResponse"
    post:
      operationId: setFlashMessage
      tags: [admin]
      summary: Set or update the flash message shown to all users on login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetFlashMessageBody"
      responses:
        "200":
          description: Flash message updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FlashMessageResponse"
    delete:
      operationId: clearFlashMessage
      tags: [admin]
      summary: Clear the flash message
      responses:
        "200":
          description: Flash message cleared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FlashMessageResponse"

  /admin/korapay-settings:
    get:
      operationId: getKorapaySettings
      tags: [admin]
      summary: Get current Korapay payment gateway settings (mode + keys)
      responses:
        "200":
          description: Current Korapay settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KorapaySettingsResponse"
    put:
      operationId: setKorapaySettings
      tags: [admin]
      summary: Update Korapay mode and API keys
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KorapaySettingsBody"
      responses:
        "200":
          description: Settings saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KorapaySettingsResponse"

  /payments/korapay/initialize:
    post:
      operationId: initializeKorapayCheckout
      tags: [admin]
      summary: Initialize a Korapay checkout session for rank activation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KorapayInitBody"
      responses:
        "200":
          description: Checkout URL returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KorapayInitResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    UpdateAvatarBody:
      type: object
      required: [avatarUrl]
      properties:
        avatarUrl:
          type: string

    SuccessMessage:
      type: object
      required: [success, message]
      properties:
        success:
          type: boolean
        message:
          type: string

    RegisterBody:
      type: object
      required: [firstName, surname, email, password, transactionPin, whatsappNumber, homeAddress, bankName, accountNumber, accountHolderName, zipCode, gender]
      properties:
        firstName:
          type: string
        middleName:
          type: string
        surname:
          type: string
        gender:
          type: string
          enum: [male, female]
        whatsappNumber:
          type: string
        email:
          type: string
        password:
          type: string
        transactionPin:
          type: string
        homeAddress:
          type: string
        bankName:
          type: string
        accountNumber:
          type: string
        accountHolderName:
          type: string
        zipCode:
          type: string
        referralCode:
          type: string

    LoginBody:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    AuthResponse:
      type: object
      required: [user]
      properties:
        user:
          $ref: "#/components/schemas/UserFull"

    UserFull:
      type: object
      required:
        - id
        - firstName
        - middleName
        - surname
        - phone
        - whatsappNumber
        - username
        - email
        - gender
        - avatar
        - homeAddress
        - bankName
        - accountNumber
        - accountHolderName
        - zipCode
        - referralCode
        - referredBy
        - position
        - level
        - role
        - isActive
        - balance
        - securityDeposit
      properties:
        id:
          type: integer
        firstName:
          type: string
        middleName:
          type: string
        surname:
          type: string
        phone:
          type: string
        whatsappNumber:
          type: string
        username:
          type: string
        email:
          type: string
        gender:
          type: string
        avatar:
          type: string
        activatedLevels:
          type: array
          items:
            type: string
        homeAddress:
          type: string
        bankName:
          type: string
        accountNumber:
